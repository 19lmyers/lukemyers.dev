<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />

		<link
			href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400&family=Source+Code+Pro:wght@700&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0&display=swap"
			rel="stylesheet"
		/>

		<meta content="width=device-width" name="viewport" />
		<meta content="light dark" name="color-scheme" />

		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />

		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#fff8f6" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1110" />

		%sveltekit.head%
	</head>
	%sveltekit.body%
